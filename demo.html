<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地端用藥建議系統 · Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f7fafc;
    --border: #e2e8f0;
    --accent: #4299e1;
    --text: #1a202c;
    --muted: #718096;
    --sans: 'Noto Sans TC', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  /* ─── HEADER ─── */
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .demo-banner {
    display: inline-block;
    background: #fff8e1;
    border: 1px solid #f6c90e;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: #7a5c00;
    font-family: var(--mono);
  }

  /* ─── INPUT AREA ─── */
  .input-area {
    background: var(--surface);
    border-radius: 16px;
    padding: 20px 24px;
    max-width: 860px;
    margin: 0 auto 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  textarea {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: var(--sans);
    resize: none;
    height: 80px;
    outline: none;
    color: var(--text);
    background: var(--surface);
    transition: border 0.2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }

  .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
  .quick-btn {
    padding: 6px 14px;
    background: #ebf8ff;
    border: 1px solid #bee3f8;
    border-radius: 20px;
    font-size: 12px;
    color: #2b6cb0;
    cursor: pointer;
    transition: all 0.18s;
    font-family: var(--sans);
  }
  .quick-btn:hover { background: #bee3f8; }
  .quick-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  button.ask-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-family: var(--sans);
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }
  button.ask-btn:hover { background: #3182ce; }

  /* ─── STATUS BAR ─── */
  .status-bar {
    max-width: 860px;
    margin: 0 auto 16px;
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .status-bar.show { display: flex; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #bee3f8;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── RESULTS ─── */
  .results {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 768px) { .results { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    display: none;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .card.show { display: block; }
  .card.visible { opacity: 1; transform: translateY(0); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }

  .model-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    font-family: var(--mono);
    color: white;
  }
  .badge-llama   { background: #4299e1; }
  .badge-qwen    { background: #48bb78; }
  .badge-gemma   { background: #9f7aea; }

  .rag-tag, .no-rag-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 8px;
    font-family: var(--mono);
  }
  .rag-tag    { background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8; }
  .no-rag-tag { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }

  .answer {
    font-size: 13.5px;
    line-height: 1.85;
    color: #2d3748;
    white-space: pre-wrap;
    margin-bottom: 14px;
    min-height: 80px;
  }

  /* typing cursor */
  .answer.typing::after {
    content: '▋';
    animation: blink 0.7s step-end infinite;
    color: var(--accent);
    font-size: 12px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .sources {
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
  }
  .sources h4 { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 400; }
  .source-item {
    display: flex;
    align-items: center;
    padding: 3px 0;
    font-size: 12px;
    color: #4a5568;
    border-bottom: 1px solid var(--border);
  }
  .source-item:last-child { border-bottom: none; }
  .src-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 6px;
    margin-right: 8px;
    color: white;
    font-family: var(--mono);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-fda      { background: #4299e1; }
  .badge-rxnorm   { background: #48bb78; }
  .badge-adverse  { background: #ed8936; }
  .badge-pubmed   { background: #9f7aea; }
  .badge-safety   { background: #f56565; }
  .badge-approved { background: #38b2ac; }
  .badge-who      { background: #667eea; }

  .disclaimer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 28px;
  }

  /* empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>💊 地端用藥建議系統</h1>
  <p class="subtitle">LLaMA 3 · Qwen3:8b · Gemma3:27b · RAG 檢索增強生成 · 68,674 筆藥品資料</p>
  <span class="demo-banner">⚡ STATIC DEMO — 預設範例回答，實際系統在本機執行</span>
</div>

<div class="input-area">
  <textarea id="question" readonly placeholder="請選擇下方範例問題..."></textarea>
  <div class="quick-btns">
    <span class="quick-btn" data-key="ckd">🫘 CKD 用藥安全</span>
    <span class="quick-btn" data-key="htn">❤️ 高血壓用藥</span>
    <span class="quick-btn" data-key="inter">⚠️ 藥物交互作用</span>
    <span class="quick-btn" data-key="pain">🩹 CKD 止痛替代</span>
  </div>
  <button class="ask-btn" id="askBtn" onclick="runDemo()">查詢用藥建議（四模型並排比較）</button>
</div>

<div class="status-bar" id="statusBar">
  <div class="spinner"></div>
  <span id="statusText">⏳ 四個模型同時查詢中，請稍候...</span>
</div>

<div class="results" id="results">
  <div class="empty-state">
    <div class="icon">💬</div>
    選擇上方範例問題，即可查看四模型並排比較結果
  </div>
</div>

<p class="disclaimer">⚠️ 本系統僅供參考，請諮詢醫師或藥師後再用藥</p>

  htn: {

let currentKey = null;

function selectQ(key) {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-key="${key}"]`).classList.add('active');
  currentKey = key;
  document.getElementById('question').value = DEMOS[key].q;
}

function runDemo() {
  if (!currentKey) {
    alert('請先選擇一個範例問題');
    return;
  }

  const demo = DEMOS[currentKey];
  const resultsEl = document.getElementById('results');
  const statusBar = document.getElementById('statusBar');

  // clear
  resultsEl.innerHTML = '';
  statusBar.classList.add('show');
  document.getElementById('askBtn').disabled = true;

  const steps = ['⏳ 翻譯查詢關鍵字...', '🔍 向量檢索相關藥品資料...', '🤖 四個模型同時推論中...'];
  let step = 0;
  const statusText = document.getElementById('statusText');
  statusText.textContent = steps[0];

  const stepInterval = setInterval(() => {
    step++;
    if (step < steps.length) statusText.textContent = steps[step];
  }, 800);

  // create cards immediately (hidden)
  demo.answers.forEach((ans, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card${i}`;

    const ragTag = ans.rag
      ? `<span class="rag-tag">✓ 有 RAG</span>`
      : `<span class="no-rag-tag">✗ 無 RAG</span>`;

    const sourcesHtml = ans.sources
      ? `<div class="sources">
          <h4>📚 參考來源</h4>
          ${ans.sources.map(s => `<div class="source-item"><span class="src-badge ${s.badge}">${s.label}</span></div>`).join('')}
        </div>`
      : '';

    card.innerHTML = `
      <div class="card-header">
        <span class="model-badge ${ans.badgeClass}">${ans.model}</span>
        ${ragTag}
      </div>
      <div class="answer typing" id="ans${i}"></div>
      ${sourcesHtml}
    `;
    resultsEl.appendChild(card);
  });

  // show cards with delay and type text
  setTimeout(() => {
    clearInterval(stepInterval);
    statusBar.classList.remove('show');
    document.getElementById('askBtn').disabled = false;

    demo.answers.forEach((ans, i) => {
      const delay = i * 200;
      setTimeout(() => {
        const card = document.getElementById(`card${i}`);
        card.classList.add('show');
        setTimeout(() => card.classList.add('visible'), 20);
        typeText(`ans${i}`, ans.text, 8);
      }, delay);
    });
  }, 2400);
}

function typeText(elId, text, speed) {
  const el = document.getElementById(elId);
  el.textContent = '';
  let i = 0;
  const interval = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      el.classList.remove('typing');
    }
  }, speed);
}

// attach quick btn handlers
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => selectQ(btn.dataset.key));
});

// auto-select first
selectQ('ckd');
